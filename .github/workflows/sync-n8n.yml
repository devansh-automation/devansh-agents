name: Sync n8n Workflows
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Fetch workflows from n8n
        run: |
          set -euo pipefail
          mkdir -p workflows
          response="$(curl -fsSL \
            -H "X-N8N-API-KEY: ${{ secrets.N8N_API_KEY }}" \
            "${{ secrets.N8N_BASE_URL }}/api/v1/workflows")"
          echo "$response" | jq -e '.data' > /dev/null
          echo "$response" | jq -c '.data[]' | while read -r workflow; do
            name="$(echo "$workflow" | jq -r '.name' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')"
            echo "$workflow" | jq '.' > "workflows/${name}.json"
          done
      - name: Commit changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workflows/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "sync: update workflows from n8n $(date +'%Y-%m-%d')"
          git push
